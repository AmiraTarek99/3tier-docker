server {
    listen 3000;
    root /usr/share/nginx/html;
    index index.html;
 
    # Serve the SPA
    location / {
        try_files $uri $uri/ /index.html;
    }
 
    # Lightweight health check endpoint for Docker healthcheck
    location /healthz {
        access_log off;
        return 200 "ok";
        add_header Content-Type text/plain;
    }
}
 
