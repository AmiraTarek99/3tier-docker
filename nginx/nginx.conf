worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid       /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include      /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Structured access log format
    log_format main '$remote_addr - [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    'rt=$request_time upstream=$upstream_response_time';

    access_log /var/log/nginx/access.log main;

    sendfile    on;
    tcp_nopush  on;
    keepalive_timeout 65;

    # Enable gzip for text-based responses
    gzip on;
    gzip_types text/plain application/json application/javascript text/css;

    # ── Upstream: React Frontend (port 3000) ──────────────────────────────────
    upstream frontend {
        server frontend:3000;
        keepalive 16;
    }

    # ── Upstream: Node.js Backend API (port 4000) ─────────────────────────────
    # To add HA / load balancing, just add more backend lines here:
    #   server backend_2:4000;
    #   server backend_3:4000;
    upstream backend {
        server backend:4000;
        keepalive 32;
    }

    # ── Main virtual host ─────────────────────────────────────────────────────
    server {
        listen 80;
        server_name _;

        # Nginx own health check (used by Docker healthcheck)
        location /nginx-health {
            access_log off;
            return 200 "ok";
            add_header Content-Type text/plain;
        }

        # Route /api/* → Node.js backend
        location /api {
            proxy_pass         http://backend;
            proxy_http_version 1.1;
            proxy_set_header   Connection       "";
            proxy_set_header   Host             $host;
            proxy_set_header   X-Real-IP        $remote_addr;
            proxy_set_header   X-Forwarded-For  $proxy_add_x_forwarded_for;
            proxy_read_timeout    30s;
            proxy_connect_timeout  5s;
        }

        # Route /metrics → backend Prometheus endpoint
        location /metrics {
            proxy_pass         http://backend;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
        }

        # Route everything else → React frontend
        location / {
            proxy_pass         http://frontend;
            proxy_http_version 1.1;
            proxy_set_header   Connection  "";
            proxy_set_header   Host        $host;
            proxy_set_header   X-Real-IP   $remote_addr;
            proxy_read_timeout 15s;
        }
    }
}